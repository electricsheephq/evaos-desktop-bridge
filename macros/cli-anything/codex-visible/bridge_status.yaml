name: bridge_status
version: "1.0"
description: Report evaos-desktop-bridge and Codex Desktop status.
tags: [codex, desktop, visible, read-only]
parameters: {}
preconditions:
  - file_exists: /Users/lume/.config/superpowers/worktrees/evaos-desktop-bridge/feat-codex-desktop-passive-observer/.venv/bin/python
steps:
  - id: run_bridge
    backend: native_api
    action: run_command
    params:
      command:
        - /Users/lume/.config/superpowers/worktrees/evaos-desktop-bridge/feat-codex-desktop-passive-observer/.venv/bin/python
        - -m
        - evaos_desktop_bridge.cli
        - status
        - --json
      capture_stdout: true
    timeout_ms: 30000
    on_failure: fail
postconditions:
  - always: true
agent_hints:
  danger_level: safe
  side_effects: []
  reversible: true
