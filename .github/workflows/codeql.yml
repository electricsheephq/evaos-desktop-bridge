name: CodeQL Core

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "src/**"
      - "tests/**"
      - "openclaw-plugin/**"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
  push:
    branches:
      - main
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:

concurrency:
  group: codeql-core-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - actions
          - javascript-typescript
          - python
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: /language:${{ matrix.language }}
