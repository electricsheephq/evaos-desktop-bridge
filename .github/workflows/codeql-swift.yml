name: CodeQL Swift

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  release:
    types:
      - published
  schedule:
    - cron: "47 10 * * *"
  workflow_dispatch:

concurrency:
  group: codeql-swift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          languages: swift
          build-mode: manual

      - name: Build Eva Desktop for CodeQL
        run: swift build --package-path apps/eva-desktop-mac --product EvaDesktop --arch arm64

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        with:
          category: /language:swift
